spring:
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
    properties:
      hibernate:
           dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    user:
      name: admin
      password: admin
    basic:
      enabled: false

server:
  port: 8088

baseURL:
  localhost: "http://localhost:8088/"

Chapa:
  secretKey: ${CHAPA_SECRET_KEY}

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
